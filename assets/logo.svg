<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="#e94560" stroke-width="2"/>

  <!-- Daemon horns -->
  <path d="M60 75 Q50 40 40 55 Q45 65 55 72" fill="#e94560" opacity="0.9"/>
  <path d="M140 75 Q150 40 160 55 Q155 65 145 72" fill="#e94560" opacity="0.9"/>

  <!-- Face/skull shape -->
  <ellipse cx="100" cy="100" rx="45" ry="42" fill="#16213e" stroke="#0f3460" stroke-width="1.5"/>

  <!-- Eyes - terminal cursors blinking -->
  <rect x="75" y="88" width="16" height="20" rx="2" fill="#0f3460"/>
  <rect x="109" y="88" width="16" height="20" rx="2" fill="#0f3460"/>
  <!-- Cursor blinks -->
  <rect x="78" y="91" width="3" height="14" fill="#e94560">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="119" y="91" width="3" height="14" fill="#e94560">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite" begin="0.6s"/>
  </rect>

  <!-- Mouth - command prompt -->
  <text x="100" y="130" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="14" font-weight="bold">$ _</text>

  <!-- Orbiting data nodes -->
  <circle cx="100" cy="20" r="4" fill="#533483">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="100" r="3" fill="#e94560">
    <animateTransform attributeName="transform" type="rotate" from="120 100 100" to="480 100 100" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="180" r="3.5" fill="#0f3460">
    <animateTransform attributeName="transform" type="rotate" from="240 100 100" to="600 100 100" dur="8s" repeatCount="indefinite"/>
  </circle>
</svg>
